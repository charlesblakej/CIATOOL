<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<body class="bg-slate-50">

            <!-- LEFT: KMZ -->
            <div class="simple-card p-6">

                           class="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-slate-900 file:text-white hover:file:bg-slate-800">
                    <button onclick="loadKMZ()" 
                            class="mt-3 w-full px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-black">Load KMZ to Map</button>
                </div>
                <div id="map" class="border border-slate-200"></div>

            </div>

            <!-- RIGHT: Controls -->
            <div class="simple-card p-6">
                <h2 class="font-semibold text-lg mb-3">2. Analyze</h2>
                <!-- (rest of controls same as previous version) -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Geography Level</label>
                    <select id="geoLevel" onchange="updateVariables()" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                        <option value="blockgroup">Block Groups (ACS)</option>
                        <option value="block">Blocks (2020 Decennial)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div><label class="block text-sm font-medium mb-1">State FIPS</label><input type="text" id="stateFips" value="48" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></div>
                    <div><label class="block text-sm font-medium mb-1">County FIPS</label><input type="text" id="countyFips" value="439" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Variables</label>
                    <div id="varContainer" class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm"></div>
                </div>

                <button onclick="analyzeArea()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg">Analyze Intersecting Areas</button>

                <div id="status" class="mt-4 text-sm hidden p-3 rounded bg-slate-100"></div>

                <button onclick="downloadCSV()" id="downloadBtn" class="mt-4 w-full px-6 py-3 bg-white border border-slate-300 rounded-lg hidden hover:bg-slate-50">Download CSV</button>

                <div id="previewSection" class="mt-6 hidden">
                    <h3 class="font-medium text-sm mb-2">Preview</h3>
                    <div class="overflow-auto max-h-64 border rounded-lg">
                        <table id="previewTable" class="min-w-full text-xs"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let projectPolygons = [];
        let currentCSV = '';
        let currentData = [];

        function initMap() {
            map = L.map('map').setView([32.75, -97.3], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadKMZ() {
            const fileInput = document.getElementById('kmzFile');
            const status = document.getElementById('mapStatus');
            status.classList.remove("hidden");
            status.innerHTML = "Loading KMZ...";

            if (!fileInput.files.length) {
                status.innerHTML = "❌ No file selected";
                return;
            }

            const file = fileInput.files[0];
            projectPolygons = [];

            // Clear old layers
            map.eachLayer(l => { if (l instanceof L.Polygon) map.removeLayer(l); });

            try {
                const zip = await JSZip.loadAsync(file);
                let kmlContent = null;

                // Look for any .kml file
                for (let path in zip.files) {
                    if (path.toLowerCase().endsWith('.kml')) {
                        kmlContent = await zip.files[path].async('string');
                        break;
                    }
                }

                if (!kmlContent) {
                    status.innerHTML = "❌ No KML file found inside KMZ";
                    return;
                }

                const parser = new DOMParser();
                const xml = parser.parseFromString(kmlContent, "text/xml");
                const coordsElements = xml.querySelectorAll("coordinates");

                let polyCount = 0;
                let allBoundsPoints = [];

                coordsElements.forEach(el => {
                    const text = el.textContent.trim();
                    if (!text) return;

                    const coordPairs = text.split(/\s+/);
                    const points = [];

                    for (let pair of coordPairs) {
                        const [lon, lat] = pair.split(',').map(Number);
                        if (!isNaN(lat) && !isNaN(lon)) {
                            points.push([lat, lon]); // Leaflet: [lat, lon]
                            allBoundsPoints.push([lat, lon]);
                        }
                    }

                    if (points.length > 2) {
                        L.polygon(points, {color: "#003366", weight: 3, fillOpacity: 0.2}).addTo(map);
                        projectPolygons.push(points);
                        polyCount++;
                    }
                });

                if (polyCount > 0 && allBoundsPoints.length > 0) {
                    map.fitBounds(allBoundsPoints);
                    status.innerHTML = `✅ Success: Loaded ${polyCount} polygon(s)`;
                    status.classList.add("text-emerald-700");
                } else {
                    status.innerHTML = "⚠️ No valid polygons found in KMZ";
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `❌ Error: ${err.message || "Invalid KMZ"}`;
            }
        }

        function updateVariables() {
            // Same as before (omitted for brevity - copy from previous version)
            const level = document.getElementById("geoLevel").value;
            const container = document.getElementById("varContainer");
            container.innerHTML = level === "blockgroup" ? 
                `<label><input type="checkbox" id="var_pop" checked> Pop</label>
                 <label><input type="checkbox" id="var_income" checked> Income</label>
                 <label><input type="checkbox" id="var_minority" checked> % Minority</label>` :
                `<label><input type="checkbox" id="var_pop" checked> Population</label>`;
        }
